kind = "web"
previewPath = "/"
title = "Daily Learning Streak Tracker"
version = "1.0.0"
id = "artifacts/streak-tracker"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 24530
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/streak-tracker run dev"

[services.env]
PORT = "24530"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/streak-tracker", "run", "build"]
publicDir = "artifacts/streak-tracker/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
