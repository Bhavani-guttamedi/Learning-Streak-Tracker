openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Daily Learning Streak Tracker API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: study
    description: Study tracking operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /study:
    post:
      operationId: markStudied
      tags: [study]
      summary: Mark today as studied
      description: Records today's study session
      responses:
        "200":
          description: Successfully marked today as studied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarkStudiedResponse"
        "409":
          description: Already marked today as studied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /streak:
    get:
      operationId: getStreak
      tags: [study]
      summary: Get streak information
      description: Returns current streak, total days studied, and last study date
      responses:
        "200":
          description: Streak information
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StreakInfo"
  /history:
    get:
      operationId: getHistory
      tags: [study]
      summary: Get study history
      description: Returns list of all study dates, newest first
      responses:
        "200":
          description: Study history
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StudyHistory"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    MarkStudiedResponse:
      type: object
      properties:
        message:
          type: string
        currentStreak:
          type: integer
        totalDays:
          type: integer
        date:
          type: string
      required:
        - message
        - currentStreak
        - totalDays
        - date
    StreakInfo:
      type: object
      properties:
        currentStreak:
          type: integer
        totalDays:
          type: integer
        lastStudyDate:
          type: string
          nullable: true
        studiedToday:
          type: boolean
      required:
        - currentStreak
        - totalDays
        - lastStudyDate
        - studiedToday
    StudyHistory:
      type: object
      properties:
        dates:
          type: array
          items:
            type: string
      required:
        - dates
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
      required:
        - error
        - message
